<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neutral Spectrum Dimensions Mockup</title>
  <style>
    :root {
      --accent-primary: #cf9f3d;
      --accent-gradient: linear-gradient(135deg, #cf9f3d 0%, #ffb703 100%);
      --bg-dark: #070707;
      --card-bg: rgba(255, 255, 255, 0.02);
      --border-color: rgba(255, 255, 255, 0.05);
      --text-main: #ffffff;
      --text-muted: #888888;
    }
    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      background: #111;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 30px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
    }
    h2 {
      margin: 0 0 24px 0;
      font-size: 1.4rem;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .dimension-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
      transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
    }
    .dimension-card:hover {
      border-color: rgba(207, 159, 61, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(207, 159, 61, 0.04);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }
    .score {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--accent-primary);
      text-shadow: 0 0 10px rgba(207, 159, 61, 0.2);
    }
    
    /* Neutral Spectrum Track (No Left-to-Right Progress Color) */
    .slider-track {
      position: relative;
      height: 4px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 2px;
      margin: 14px 0 8px 0;
      overflow: visible;
    }
    /* Center Tick Mark indicating the balance point (50%) */
    .center-tick {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 12px;
      background: rgba(255, 255, 255, 0.35);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 1;
    }
    .slider-thumb {
      position: absolute;
      top: 50%;
      width: 14px;
      height: 14px;
      background: #fff;
      border: 2px solid var(--accent-primary);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px var(--accent-primary);
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.15s ease;
      z-index: 2;
    }
    .dimension-card:hover .slider-thumb {
      transform: translate(-50%, -50%) scale(1.2);
      background: var(--accent-primary);
      border-color: #fff;
    }
    
    /* Low / High Pole Indicators */
    .poles {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Your Profile Dimensions</h2>

    <!-- Dimension 1 -->
    <div class="dimension-card">
      <div class="header">
        <span class="title">Directness</span>
        <span class="score">46%</span>
      </div>
      <div class="slider-track">
        <div class="center-tick"></div>
        <div class="slider-thumb" style="left: 46%;"></div>
      </div>
      <div class="poles">
        <span style="font-weight: 500;">Diplomatic & Indirect</span>
        <span style="opacity: 0.65;">Frank & Direct</span>
      </div>
    </div>

    <!-- Dimension 2 -->
    <div class="dimension-card">
      <div class="header">
        <span class="title">Social Energy</span>
        <span class="score">62%</span>
      </div>
      <div class="slider-track">
        <div class="center-tick"></div>
        <div class="slider-thumb" style="left: 62%;"></div>
      </div>
      <div class="poles">
        <span style="opacity: 0.65;">Reserved & Introspective</span>
        <span style="font-weight: 500;">Outgoing & Expressive</span>
      </div>
    </div>

    <!-- Dimension 3 -->
    <div class="dimension-card">
      <div class="header">
        <span class="title">Reflectiveness</span>
        <span class="score">17%</span>
      </div>
      <div class="slider-track">
        <div class="center-tick"></div>
        <div class="slider-thumb" style="left: 17%;"></div>
      </div>
      <div class="poles">
        <span style="font-weight: 500;">Action-Oriented & Spontaneous</span>
        <span style="opacity: 0.65;">Deliberate & Analytical</span>
      </div>
    </div>
  </div>
</body>
</html>
